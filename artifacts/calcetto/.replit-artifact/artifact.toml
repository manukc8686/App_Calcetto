kind = "web"
previewPath = "/"
title = "Torneo Calcetto"
version = "1.0.0"
id = "artifacts/calcetto"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19040

[services.development]
run = "pnpm --filter @workspace/calcetto run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/calcetto", "run", "build" ]
publicDir = "artifacts/calcetto/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19040"
BASE_PATH = "/"
